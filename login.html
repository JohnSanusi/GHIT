<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
  </head>
  <link href="./src/output.css" rel="stylesheet" />

  <body class="font-sans font-semibold text-black">
    <div class="flex justify-center items-center mt-32 flex-col gap-3">
      <h1 class="text-6xl text-blue-500 mb-5 font-bold">LOGIN</h1>
      <form
        id="login"
        class="w-[90%] md:w-[70%] lg:w-[45%] shadow-md rounded-xl h-auto p-4"
      >
        <input
          type="email"
          name="login-email"
          id="login-email"
          placeholder="Email"
          required
          class="w-full p-3 text-xl font-light border border-black-[1.3px] rounded-xl mb-4"
        />
        <input
          type="password"
          name="login-password"
          id="login-password"
          placeholder="Password"
          class="w-full p-3 text-xl font-light border border-black-[1.3px] rounded-xl mb-4"
          required
        />
        <button
          id="login-btn"
          class="w-full p-3 flex justify-center items-center bg-blue-500 text-2xl text-white cursor-pointer rounded-xl hover:bg-blue-700 mb-7"
        >
          Login
        </button>
        <p class="text-center text-lg font-light">
          No account?
          <a href="signup.html" class="text-blue-500 font-underline">SignUp</a>
        </p>
      </form>
    </div>
    <script src="JS/auth.js"></script>
  </body>
</html>
