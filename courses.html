<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GHIT- Courses</title>
  </head>
  <link href="./src/output.css" rel="stylesheet" />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css"
    integrity="sha512-1cK78a1o+ht2JcaW6g8OXYwqpev9+6GqOkz9xmBN9iUUhIndKtxwILGWYOSibOKjLsEdjyjZvYDq/cZwNeak0w=="
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css"
    integrity="sha512-dPXYcDub/aeb08c63jRq/k6GaKccl256JQy/AnOq7CAnEZ9FzSL9wSbcZkMp4R26vBsMLFYH4kQ67/bbV8XaCQ=="
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  />
  <body class="font-sans font-semibold text-black">
    <header class="w-full h-full bg-gray">
      <nav
        class="bg-white/20 fixed w-full z-20 top-0 start-0 shadow-md backdrop-blur-md"
        data-aos="fade-down"
        data-aos-duration="1000"
      >
        <div
          class="max-w-screen-xl flex flex-wrap items-center justify-between mx-auto p-4"
        >
          <a href="" class="flex items-center space-x-3 rtl:space-x-reverse">
            <span
              class="self-center text-3xl font-bold whitespace-nowrap text-blue-500"
              >GHIT</span
            >
          </a>
          <div
            class="flex md:order-2 space-x-3 md:space-x-0 rtl:space-x-reverse"
          >
            <a
              href="login.html"
              class="text-black hidden border border-black-[1.8px] font-medium rounded-lg text-sm px-4 py-2 text-center mr-3 cursor-pointer md:flex lg:flex hover:shadow-xl"
            >
              Login
            </a>
            <a
              href="signup.html"
              class="text-white bg-blue-500 hover:bg-blue-600 cursor-pointer focus:ring-4 focus:outline-none focus:ring-blue-300 font-medium rounded-lg text-sm px-4 py-2 text-center dark:bg-blue-600 dark:hover:bg-blue-700 dark:focus:ring-blue-800"
            >
              Get started
            </a>
            <button
              data-collapse-toggle="navbar-sticky"
              type="button"
              class="inline-flex items-center p-2 w-10 h-10 justify-center text-sm text-gray-500 rounded-lg md:hidden hover:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-gray-200 dark:text-gray-400 dark:hover:bg-gray-700 dark:focus:ring-gray-600"
              aria-controls="navbar-sticky"
              aria-expanded="false"
              id="icon"
            >
              <span class="sr-only">Open main menu</span>
              <svg
                class="w-5 h-5"
                aria-hidden="true"
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 17 14"
              >
                <path
                  stroke="currentColor"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M1 1h15M1 7h15M1 13h15"
                />
              </svg>
            </button>
          </div>
          <div
            class="items-center justify-between hidden w-full md:flex md:w-auto md:order-1"
            id="navbar-sticky"
          >
            <ul
              class="flex flex-col p-4 md:p-0 mt-4 font-medium md:space-x-8 rtl:space-x-reverse md:flex-row md:mt-0"
            >
              <li>
                <a
                  href="index.html"
                  class="block py-2 px-3 text-black rounded-sm hover:text-blue-500 md:p-0"
                  >Home</a
                >
              </li>
              <li>
                <a
                  href="index.html#about"
                  class="block py-2 px-3 text-black hover:text-blue-500 rounded-sm md:p-0"
                  >About</a
                >
              </li>
              <li>
                <a
                  href="index.html#services"
                  class="block py-2 px-3 text-black hover:text-blue-500 rounded-sm md:p-0"
                  >Services</a
                >
              </li>
              <li>
                <a
                  href="index.html#contact"
                  class="block py-2 px-3 text-black hover:text-blue-500 rounded-sm md:p-0"
                  >Contact</a
                >
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>
    <main class="mt-20 p-8">
      <div
        id="container"
        class="flex flex-col gap-2 mt-5 md:flex md:flex-row md:flex-wrap md:gap-3 lg:flex lg:flex-row lg:gap-6"
      ></div>
    </main>
    <footer
      class="w-full bg-gray-950 p-3 text-white flex justify-center items-center flex-col gap-3 font-light"
    >
      <p>&copy; 2025 GHIT. All rights reserved.</p>
      <div class="flex gap-5">
        <a href="#">Privacy Policy</a> <a href="#">Terms of service</a>
      </div>
    </footer>
    <!-- SCRIPTS -->
    <script src="JS/index.js"></script>
    <script src="JS/courses.js"></script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"
      integrity="sha512-A7AYk1fGKX6S2SsHywmPkrnzTZHrgiVT7GcQkLGDe2ev0aWb8zejytzS8wjo7PGEXKqJOrjQ4oORtnimIRZBtw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
    <script>
      AOS.init();
    </script>
  </body>
</html>
